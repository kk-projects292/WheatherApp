<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <h1>Weather App</h1>
      <p class="tagline">Check the weather anywhere in the world</p>
    </header>

    <div class="search-container">
      <div class="search-box">
        <input
          type="text"
          id="city-input"
          placeholder="Enter city name..."
          autocomplete="off"
        >
        <button id="search-btn" aria-label="Search for weather">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
        </button>
      </div>
      <div class="location-info" id="location-info"></div>
    </div>

    <div class="weather-container" id="weather-container">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Loading weather data...</p>
      </div>

      <div class="error-message" id="error-message" style="display: none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <p id="error-text"></p>
      </div>

      <div class="weather-info" id="weather-info" style="display: none;">
        <div class="main-weather">
          <div class="temp-container">
            <h2 class="temperature" id="temperature">--°C</h2>
            <p class="description" id="description">--</p>
          </div>
          <div class="weather-icon">
            <img id="weather-icon" src="" alt="Weather icon">
          </div>
        </div>

        <div class="city-info">
          <h3 class="city-name" id="city-name">--</h3>
          <p class="date-time" id="date-time">--</p>
        </div>

        <div class="weather-details">
          <div class="detail-card">
            <span class="label">Feels Like</span>
            <span class="value" id="feels-like">--°C</span>
          </div>
          <div class="detail-card">
            <span class="label">Humidity</span>
            <span class="value" id="humidity">--%</span>
          </div>
          <div class="detail-card">
            <span class="label">Wind Speed</span>
            <span class="value" id="wind-speed">-- m/s</span>
          </div>
          <div class="detail-card">
            <span class="label">Pressure</span>
            <span class="value" id="pressure">-- hPa</span>
          </div>
          <div class="detail-card">
            <span class="label">Visibility</span>
            <span class="value" id="visibility">-- km</span>
          </div>
          <div class="detail-card">
            <span class="label">Sunrise</span>
            <span class="value" id="sunrise">--:--</span>
          </div>
          <div class="detail-card">
            <span class="label">Sunset</span>
            <span class="value" id="sunset">--:--</span>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer">
      <p>Powered by <a href="https://openweathermap.org/api" target="_blank" rel="noopener">OpenWeatherMap</a></p>
      <p class="credits">Weather data updated automatically</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
